<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    {% include 'partials/navbar.html' %}

    <main>
        <h1>Dashboard</h1>

        <div class="cards">
            <div class="card">
                <h2>{{ total_employees }}</h2>
                <p>Empleados activos</p>
            </div>
            <div class="card">
                <h2>{{ total_departments }}</h2>
                <p>Departamentos</p>
            </div>
            <div class="card">
                <h2>{{ total_vacations }}</h2>
                <p>Vacaciones pendientes</p>
            </div>
        </div>

        <div class="actions">
            <a href="/employees" class="btn">Ver empleados</a>
            <a href="/employees/alta" class="btn">Agregar empleado</a>
            <a href="/chat" class="btn btn-ia">💬 Chatbot IA</a>
        </div>
    </main>

    {% include 'partials/footer.html' %}

</body>
</html>
