<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Empleado — HR Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    {% include 'partials/navbar.html' %}

    <main>
        <div class="page-header">
            <h1>Agregar Empleado</h1>
            <a href="/employees" class="btn">← Volver</a>
        </div>

        <div class="form-container">
            <form method="POST">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input type="text" name="name" required placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required placeholder="juan@empresa.com">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" name="phone" placeholder="1134567890">
                </div>
                <div class="form-group">
                    <label>Cargo</label>
                    <input type="text" name="position" required placeholder="Ej: Desarrollador Backend">
                </div>
                <div class="form-group">
                    <label>Salario</label>
                    <input type="number" name="salary" required placeholder="75000">
                </div>
                <div class="form-group">
                    <label>Fecha de ingreso</label>
                    <input type="date" name="hire_date" required>
                </div>
                <div class="form-group">
                    <label>Departamento</label>
                    <select name="department_id" required>
                        <option value="">Seleccioná un departamento</option>
                        {% for dep in departments %}
                        <option value="{{ dep.id }}">{{ dep.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn">Guardar empleado</button>
            </form>
        </div>
    </main>

    {% include 'partials/footer.html' %}

</body>
</html>
