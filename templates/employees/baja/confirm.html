<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dar de Baja — HR Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    {% include 'partials/navbar.html' %}

    <main>
        <div class="page-header">
            <h1>Dar de Baja</h1>
            <a href="/employees" class="btn">← Volver</a>
        </div>

        <div class="form-container">
            <div class="alert">
                <h2>⚠️ ¿Estás seguro?</h2>
                <p>Estás por dar de baja a <strong>{{ employee.name }}</strong>.</p>
                <p>El empleado no será eliminado, solo quedará inactivo.</p>
            </div>

            <form method="POST">
                <div class="actions">
                    <button type="submit" class="btn btn-ia">Confirmar baja</button>
                    <a href="/employees" class="btn">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    {% include 'partials/footer.html' %}

</body>
</html>
